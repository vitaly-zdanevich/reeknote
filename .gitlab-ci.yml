stages:
  - lint
  - test
  - build
  - package
  - upload
  - release
  - publish

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUST_IMAGE: rust:1.94-bookworm
  PYPI_BUILD_IMAGE: ghcr.io/pyo3/maturin:v1.12.6
  NODE_IMAGE: node:24-bookworm
  AUR_IMAGE: archlinux:base-devel
  FEDORA_IMAGE: fedora:latest
  OPENSUSE_IMAGE: opensuse/tumbleweed:latest
  NIX_IMAGE: nixos/nix:latest
  NIX_CONFIG: "experimental-features = nix-command flakes"

cache:
  key: "$CI_JOB_NAME"
  paths:
    - .cargo/registry
    - .cargo/git
    - target

.rust-linux:
  image: "$RUST_IMAGE"
  before_script:
    - rustc --version
    - cargo --version

test:
  extends: .rust-linux
  stage: test
  tags:
    - saas-linux-small-amd64
  script:
    - cargo test --locked

fmt:
  extends: .rust-linux
  stage: lint
  tags:
    - saas-linux-small-amd64
  script:
    - rustup component add rustfmt
    - cargo fmt --check

clippy:
  extends: .rust-linux
  stage: lint
  tags:
    - saas-linux-small-amd64
  script:
    - rustup component add clippy
    - cargo clippy --locked --all-targets --all-features -- -D warnings

nix:build:
  stage: build
  image: "$NIX_IMAGE"
  tags:
    - saas-linux-small-amd64
  script:
    - nix --version
    - nix flake check --no-update-lock-file --print-build-logs
    - nix build .#reeknote --no-update-lock-file --print-build-logs
    - ./result/bin/reeknote >/dev/null

.build-linux:
  extends: .rust-linux
  stage: build
  script:
    - rustup target add "$RUST_TARGET"
    - cargo build --locked --release --bins --target "$RUST_TARGET"
    - mkdir -p dist
    - cp "target/$RUST_TARGET/release/reeknote" dist/
    - cp "target/$RUST_TARGET/release/rnsync" dist/
    - tar -C dist -czf "$ARTIFACT_NAME.tar.gz" reeknote rnsync
    - sha256sum "$ARTIFACT_NAME.tar.gz" > "$ARTIFACT_NAME.tar.gz.sha256"
  artifacts:
    name: "$ARTIFACT_NAME"
    paths:
      - "$ARTIFACT_NAME.tar.gz"
      - "$ARTIFACT_NAME.tar.gz.sha256"
    expire_in: 1 week

build:linux:x86_64:
  extends: .build-linux
  tags:
    - saas-linux-small-amd64
  variables:
    RUST_TARGET: x86_64-unknown-linux-gnu
    ARTIFACT_NAME: reeknote-linux-x86_64

build:linux:arm64:
  extends: .build-linux
  tags:
    - saas-linux-small-arm64
  variables:
    RUST_TARGET: aarch64-unknown-linux-gnu
    ARTIFACT_NAME: reeknote-linux-aarch64

.build-pypi-wheel:
  stage: build
  image:
    name: "$PYPI_BUILD_IMAGE"
    entrypoint: [""]
  script:
    - cargo build --release --locked --bin "$PYPI_BINARY"
    - python3 tools/build_cli_wheel.py --package "$PYPI_PACKAGE" --command "$PYPI_BINARY" --binary "target/release/$PYPI_BINARY" --platform-tag "$PYPI_PLATFORM_TAG" --summary "$PYPI_SUMMARY" --out dist
  artifacts:
    paths:
      - dist/*.whl
    expire_in: 1 week

build:pypi:reeknote:linux:x86_64:
  extends: .build-pypi-wheel
  tags:
    - saas-linux-small-amd64
  variables:
    PYPI_PACKAGE: reeknote
    PYPI_BINARY: reeknote
    PYPI_PLATFORM_TAG: manylinux_2_17_x86_64
    PYPI_SUMMARY: Command-line Evernote client

build:pypi:reeknote:linux:arm64:
  extends: .build-pypi-wheel
  tags:
    - saas-linux-small-arm64
  variables:
    PYPI_PACKAGE: reeknote
    PYPI_BINARY: reeknote
    PYPI_PLATFORM_TAG: manylinux_2_17_aarch64
    PYPI_SUMMARY: Command-line Evernote client

build:pypi:rnsync:linux:x86_64:
  extends: .build-pypi-wheel
  tags:
    - saas-linux-small-amd64
  variables:
    PYPI_PACKAGE: rnsync
    PYPI_BINARY: rnsync
    PYPI_PLATFORM_TAG: manylinux_2_17_x86_64
    PYPI_SUMMARY: Evernote note synchronization CLI

build:pypi:rnsync:linux:arm64:
  extends: .build-pypi-wheel
  tags:
    - saas-linux-small-arm64
  variables:
    PYPI_PACKAGE: rnsync
    PYPI_BINARY: rnsync
    PYPI_PLATFORM_TAG: manylinux_2_17_aarch64
    PYPI_SUMMARY: Evernote note synchronization CLI

package:npm:reeknote:linux:x64:
  stage: package
  image: "$NODE_IMAGE"
  tags:
    - saas-linux-small-amd64
  needs:
    - job: build:linux:x86_64
      artifacts: true
  script:
    - mkdir -p npm/reeknote-linux-x64/bin npm-dist unpack
    - tar -xzf reeknote-linux-x86_64.tar.gz -C unpack
    - cp unpack/reeknote npm/reeknote-linux-x64/bin/reeknote
    - npm pack ./npm/reeknote-linux-x64 --pack-destination npm-dist
  artifacts:
    paths:
      - npm-dist/*.tgz
    expire_in: 1 week

package:npm:reeknote:linux:arm64:
  stage: package
  image: "$NODE_IMAGE"
  tags:
    - saas-linux-small-arm64
  needs:
    - job: build:linux:arm64
      artifacts: true
  script:
    - mkdir -p npm/reeknote-linux-arm64/bin npm-dist unpack
    - tar -xzf reeknote-linux-aarch64.tar.gz -C unpack
    - cp unpack/reeknote npm/reeknote-linux-arm64/bin/reeknote
    - npm pack ./npm/reeknote-linux-arm64 --pack-destination npm-dist
  artifacts:
    paths:
      - npm-dist/*.tgz
    expire_in: 1 week

package:npm:rnsync:linux:x64:
  stage: package
  image: "$NODE_IMAGE"
  tags:
    - saas-linux-small-amd64
  needs:
    - job: build:linux:x86_64
      artifacts: true
  script:
    - mkdir -p npm/rnsync-linux-x64/bin npm-dist unpack
    - tar -xzf reeknote-linux-x86_64.tar.gz -C unpack
    - cp unpack/rnsync npm/rnsync-linux-x64/bin/rnsync
    - npm pack ./npm/rnsync-linux-x64 --pack-destination npm-dist
  artifacts:
    paths:
      - npm-dist/*.tgz
    expire_in: 1 week

package:npm:rnsync:linux:arm64:
  stage: package
  image: "$NODE_IMAGE"
  tags:
    - saas-linux-small-arm64
  needs:
    - job: build:linux:arm64
      artifacts: true
  script:
    - mkdir -p npm/rnsync-linux-arm64/bin npm-dist unpack
    - tar -xzf reeknote-linux-aarch64.tar.gz -C unpack
    - cp unpack/rnsync npm/rnsync-linux-arm64/bin/rnsync
    - npm pack ./npm/rnsync-linux-arm64 --pack-destination npm-dist
  artifacts:
    paths:
      - npm-dist/*.tgz
    expire_in: 1 week

package:npm:rnsync:
  stage: package
  image: "$NODE_IMAGE"
  tags:
    - saas-linux-small-amd64
  script:
    - mkdir -p npm-dist
    - npm pack ./npm/rnsync --pack-destination npm-dist
  artifacts:
    paths:
      - npm-dist/*.tgz
    expire_in: 1 week

package:npm:reeknote:
  stage: package
  image: "$NODE_IMAGE"
  tags:
    - saas-linux-small-amd64
  script:
    - mkdir -p npm-dist
    - npm pack ./npm/reeknote --pack-destination npm-dist
  artifacts:
    paths:
      - npm-dist/*.tgz
    expire_in: 1 week

package:deb:amd64:
  stage: package
  image: debian:bookworm
  extends: .release-tag-rules
  tags:
    - saas-linux-small-amd64
  needs:
    - job: build:linux:x86_64
      artifacts: true
  script:
    - bash tools/build_deb.sh "$CI_COMMIT_TAG" amd64 reeknote-linux-x86_64.tar.gz deb-dist
  artifacts:
    paths:
      - deb-dist/*.deb
      - deb-dist/*.deb.sha256
    expire_in: 1 week

package:deb:arm64:
  stage: package
  image: debian:bookworm
  extends: .release-tag-rules
  tags:
    - saas-linux-small-arm64
  needs:
    - job: build:linux:arm64
      artifacts: true
  script:
    - bash tools/build_deb.sh "$CI_COMMIT_TAG" arm64 reeknote-linux-aarch64.tar.gz deb-dist
  artifacts:
    paths:
      - deb-dist/*.deb
      - deb-dist/*.deb.sha256
    expire_in: 1 week

package:rpm:x86_64:
  stage: package
  image: "$FEDORA_IMAGE"
  extends: .release-tag-rules
  tags:
    - saas-linux-small-amd64
  script:
    - dnf install --assumeyes cargo findutils git gzip rpm-build rust tar
    - test "$(grep -m1 '^version =' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')" = "$CI_COMMIT_TAG"
    - bash tools/build_rpm.sh "$CI_COMMIT_TAG" rpm-dist include-srpm
  artifacts:
    paths:
      - rpm-dist/*.rpm
      - rpm-dist/*.rpm.sha256
    expire_in: 1 week

package:rpm:aarch64:
  stage: package
  image: "$FEDORA_IMAGE"
  extends: .release-tag-rules
  tags:
    - saas-linux-small-arm64
  script:
    - dnf install --assumeyes cargo findutils git gzip rpm-build rust tar
    - test "$(grep -m1 '^version =' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')" = "$CI_COMMIT_TAG"
    - bash tools/build_rpm.sh "$CI_COMMIT_TAG" rpm-dist binary-only
  artifacts:
    paths:
      - rpm-dist/*.rpm
      - rpm-dist/*.rpm.sha256
    expire_in: 1 week

package:obs:opensuse:x86_64:
  stage: package
  image: "$OPENSUSE_IMAGE"
  extends: .release-tag-rules
  tags:
    - saas-linux-small-amd64
  script:
    - zypper --non-interactive refresh
    - zypper --non-interactive install ca-certificates cargo findutils gcc git gzip rpm-build rust tar
    - test "$(grep -m1 '^version =' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')" = "$CI_COMMIT_TAG"
    - bash tools/build_obs_package.sh "$CI_COMMIT_TAG" obs-dist build-rpm
  artifacts:
    paths:
      - obs-dist/reeknote.spec
      - obs-dist/reeknote-*.tar.gz
      - obs-dist/reeknote-*.tar.gz.sha256
      - obs-dist/vendor-*.tar.gz
      - obs-dist/vendor-*.tar.gz.sha256
      - obs-dist/*.rpm
      - obs-dist/*.rpm.sha256
    expire_in: 1 week

.release-tag-rules:
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/'
    - when: never

upload:release-binaries:
  stage: upload
  image:
    name: curlimages/curl:8.11.1
    entrypoint: [""]
  extends: .release-tag-rules
  tags:
    - saas-linux-small-amd64
  dependencies:
    - build:linux:x86_64
    - build:linux:arm64
    - package:deb:amd64
    - package:deb:arm64
    - package:rpm:x86_64
    - package:rpm:aarch64
  script:
    - PACKAGE_REGISTRY_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/reeknote/${CI_COMMIT_TAG}"
    - |
      for file in \
        reeknote-linux-x86_64.tar.gz \
        reeknote-linux-x86_64.tar.gz.sha256 \
        reeknote-linux-aarch64.tar.gz \
        reeknote-linux-aarch64.tar.gz.sha256 \
        "deb-dist/reeknote_${CI_COMMIT_TAG}_amd64.deb" \
        "deb-dist/reeknote_${CI_COMMIT_TAG}_amd64.deb.sha256" \
        "deb-dist/reeknote_${CI_COMMIT_TAG}_arm64.deb" \
        "deb-dist/reeknote_${CI_COMMIT_TAG}_arm64.deb.sha256" \
        "rpm-dist/reeknote_${CI_COMMIT_TAG}_x86_64.rpm" \
        "rpm-dist/reeknote_${CI_COMMIT_TAG}_x86_64.rpm.sha256" \
        "rpm-dist/reeknote_${CI_COMMIT_TAG}_aarch64.rpm" \
        "rpm-dist/reeknote_${CI_COMMIT_TAG}_aarch64.rpm.sha256" \
        "rpm-dist/reeknote_${CI_COMMIT_TAG}.src.rpm" \
        "rpm-dist/reeknote_${CI_COMMIT_TAG}.src.rpm.sha256"
      do
        filename="$(basename "$file")"
        curl --fail --show-error \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "$file" \
          "${PACKAGE_REGISTRY_URL}/${filename}"
      done

release:gitlab:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  extends: .release-tag-rules
  tags:
    - saas-linux-small-amd64
  dependencies: []
  script:
    - echo "Creating GitLab release for ${CI_COMMIT_TAG}"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Reeknote $CI_COMMIT_TAG"
    description: "Ready-to-use Linux binaries for Reeknote $CI_COMMIT_TAG."
    assets:
      links:
        - name: "reeknote-linux-x86_64.tar.gz"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote-linux-x86_64.tar.gz"
          filepath: "/reeknote-linux-x86_64.tar.gz"
          link_type: "package"
        - name: "reeknote-linux-x86_64.tar.gz.sha256"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote-linux-x86_64.tar.gz.sha256"
          filepath: "/reeknote-linux-x86_64.tar.gz.sha256"
          link_type: "package"
        - name: "reeknote-linux-aarch64.tar.gz"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote-linux-aarch64.tar.gz"
          filepath: "/reeknote-linux-aarch64.tar.gz"
          link_type: "package"
        - name: "reeknote-linux-aarch64.tar.gz.sha256"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote-linux-aarch64.tar.gz.sha256"
          filepath: "/reeknote-linux-aarch64.tar.gz.sha256"
          link_type: "package"
        - name: "reeknote_${CI_COMMIT_TAG}_amd64.deb"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote_${CI_COMMIT_TAG}_amd64.deb"
          filepath: "/reeknote_${CI_COMMIT_TAG}_amd64.deb"
          link_type: "package"
        - name: "reeknote_${CI_COMMIT_TAG}_amd64.deb.sha256"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote_${CI_COMMIT_TAG}_amd64.deb.sha256"
          filepath: "/reeknote_${CI_COMMIT_TAG}_amd64.deb.sha256"
          link_type: "package"
        - name: "reeknote_${CI_COMMIT_TAG}_arm64.deb"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote_${CI_COMMIT_TAG}_arm64.deb"
          filepath: "/reeknote_${CI_COMMIT_TAG}_arm64.deb"
          link_type: "package"
        - name: "reeknote_${CI_COMMIT_TAG}_arm64.deb.sha256"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote_${CI_COMMIT_TAG}_arm64.deb.sha256"
          filepath: "/reeknote_${CI_COMMIT_TAG}_arm64.deb.sha256"
          link_type: "package"
        - name: "reeknote_${CI_COMMIT_TAG}_x86_64.rpm"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote_${CI_COMMIT_TAG}_x86_64.rpm"
          filepath: "/reeknote_${CI_COMMIT_TAG}_x86_64.rpm"
          link_type: "package"
        - name: "reeknote_${CI_COMMIT_TAG}_x86_64.rpm.sha256"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote_${CI_COMMIT_TAG}_x86_64.rpm.sha256"
          filepath: "/reeknote_${CI_COMMIT_TAG}_x86_64.rpm.sha256"
          link_type: "package"
        - name: "reeknote_${CI_COMMIT_TAG}_aarch64.rpm"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote_${CI_COMMIT_TAG}_aarch64.rpm"
          filepath: "/reeknote_${CI_COMMIT_TAG}_aarch64.rpm"
          link_type: "package"
        - name: "reeknote_${CI_COMMIT_TAG}_aarch64.rpm.sha256"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote_${CI_COMMIT_TAG}_aarch64.rpm.sha256"
          filepath: "/reeknote_${CI_COMMIT_TAG}_aarch64.rpm.sha256"
          link_type: "package"
        - name: "reeknote_${CI_COMMIT_TAG}.src.rpm"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote_${CI_COMMIT_TAG}.src.rpm"
          filepath: "/reeknote_${CI_COMMIT_TAG}.src.rpm"
          link_type: "package"
        - name: "reeknote_${CI_COMMIT_TAG}.src.rpm.sha256"
          url: "$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/generic/reeknote/$CI_COMMIT_TAG/reeknote_${CI_COMMIT_TAG}.src.rpm.sha256"
          filepath: "/reeknote_${CI_COMMIT_TAG}.src.rpm.sha256"
          link_type: "package"

pages:
  stage: publish
  image: debian:bookworm
  extends: .release-tag-rules
  environment:
    name: release
  tags:
    - saas-linux-small-amd64
  dependencies:
    - package:deb:amd64
    - package:deb:arm64
  script:
    - apt-get update
    - apt-get install --yes --no-install-recommends ca-certificates dpkg-dev gnupg gzip python3
    - test -n "$APT_GPG_PRIVATE_KEY"
    - bash tools/build_apt_repository.sh deb-dist public
  artifacts:
    paths:
      - public

publish:pypi:
  stage: publish
  image: python:3-bookworm
  extends: .release-tag-rules
  environment:
    name: release
  tags:
    - saas-linux-small-amd64
  dependencies:
    - build:pypi:reeknote:linux:x86_64
    - build:pypi:reeknote:linux:arm64
    - build:pypi:rnsync:linux:x86_64
    - build:pypi:rnsync:linux:arm64
  id_tokens:
    PYPI_ID_TOKEN:
      aud: pypi
  script:
    - python -m pip install --upgrade twine
    - twine check dist/*
    - twine upload dist/*

publish:npm:
  stage: publish
  image: "$NODE_IMAGE"
  extends: .release-tag-rules
  environment:
    name: release
  tags:
    - saas-linux-small-amd64
  dependencies:
    - package:npm:reeknote:linux:x64
    - package:npm:reeknote:linux:arm64
    - package:npm:reeknote
    - package:npm:rnsync:linux:x64
    - package:npm:rnsync:linux:arm64
    - package:npm:rnsync
  id_tokens:
    NPM_ID_TOKEN:
      aud: "npm:registry.npmjs.org"
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  script:
    - npm --version
    - test "$(node -p "require('./npm/reeknote/package.json').version")" = "$CI_COMMIT_TAG"
    - test "$(node -p "require('./npm/reeknote-linux-x64/package.json').version")" = "$CI_COMMIT_TAG"
    - test "$(node -p "require('./npm/reeknote-linux-arm64/package.json').version")" = "$CI_COMMIT_TAG"
    - test "$(node -p "require('./npm/rnsync/package.json').version")" = "$CI_COMMIT_TAG"
    - test "$(node -p "require('./npm/rnsync-linux-x64/package.json').version")" = "$CI_COMMIT_TAG"
    - test "$(node -p "require('./npm/rnsync-linux-arm64/package.json').version")" = "$CI_COMMIT_TAG"
    - npm publish "./npm-dist/reeknote-linux-x64-${CI_COMMIT_TAG}.tgz"
    - npm publish "./npm-dist/reeknote-linux-arm64-${CI_COMMIT_TAG}.tgz"
    - npm publish "./npm-dist/vitaly-zdanevich-rnsync-linux-x64-${CI_COMMIT_TAG}.tgz" --access public
    - npm publish "./npm-dist/vitaly-zdanevich-rnsync-linux-arm64-${CI_COMMIT_TAG}.tgz" --access public
    - npm publish "./npm-dist/reeknote-${CI_COMMIT_TAG}.tgz"
    - npm publish "./npm-dist/vitaly-zdanevich-rnsync-${CI_COMMIT_TAG}.tgz" --access public

publish:crates:
  extends:
    - .rust-linux
    - .release-tag-rules
  stage: publish
  environment:
    name: release
  tags:
    - saas-linux-small-amd64
  dependencies: []
  script:
    - test "$(cargo pkgid | sed 's/.*@//')" = "$CI_COMMIT_TAG"
    - test -n "$CRATES_IO_TOKEN"
    - cargo publish --locked --dry-run
    - CARGO_REGISTRY_TOKEN="$CRATES_IO_TOKEN" cargo publish --locked

publish:aur:
  stage: publish
  image: "$AUR_IMAGE"
  extends: .release-tag-rules
  environment:
    name: release
  tags:
    - saas-linux-small-amd64
  dependencies: []
  script:
    - pacman -Syu --noconfirm --needed curl git openssh
    - test "$(grep -m1 '^version =' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')" = "$CI_COMMIT_TAG"
    - test -n "$AUR_SSH_PRIVATE_KEY"
    - bash tools/update_aur_package.sh "$CI_COMMIT_TAG"

publish:copr:
  stage: publish
  image: "$FEDORA_IMAGE"
  environment:
    name: release
  tags:
    - saas-linux-small-amd64
  dependencies:
    - package:rpm:x86_64
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/ && $COPR_CONFIG'
    - when: never
  script:
    - dnf install --assumeyes copr-cli
    - mkdir -p "$HOME/.config"
    - |
      if [ -f "$COPR_CONFIG" ]; then
        cp "$COPR_CONFIG" "$HOME/.config/copr"
      else
        printf '%s\n' "$COPR_CONFIG" > "$HOME/.config/copr"
      fi
    - chmod 0600 "$HOME/.config/copr"
    - copr-cli build "${COPR_PROJECT:-reeknote}" "rpm-dist/reeknote_${CI_COMMIT_TAG}.src.rpm"

publish:obs:
  stage: publish
  image: "$OPENSUSE_IMAGE"
  environment:
    name: release
  tags:
    - saas-linux-small-amd64
  dependencies:
    - package:obs:opensuse:x86_64
  rules:
    - if: '$CI_COMMIT_TAG =~ /^\d+\.\d+\.\d+$/ && $OSC_CONFIG'
    - when: never
  script:
    - zypper --non-interactive refresh
    - zypper --non-interactive install osc
    - mkdir -p "$HOME/.config/osc"
    - |
      if [ -f "$OSC_CONFIG" ]; then
        cp "$OSC_CONFIG" "$HOME/.config/osc/oscrc"
      else
        printf '%s\n' "$OSC_CONFIG" > "$HOME/.config/osc/oscrc"
      fi
    - chmod 0600 "$HOME/.config/osc/oscrc"
    - bash tools/publish_obs_package.sh "$CI_COMMIT_TAG" obs-dist
