stages:
  - lint
  - test
  - build

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUST_IMAGE: rust:1.94-bookworm

cache:
  key: "$CI_JOB_NAME"
  paths:
    - .cargo/registry
    - .cargo/git
    - target

.rust-linux:
  image: "$RUST_IMAGE"
  before_script:
    - rustc --version
    - cargo --version

test:
  extends: .rust-linux
  stage: test
  tags:
    - saas-linux-small-amd64
  script:
    - cargo test --locked

fmt:
  extends: .rust-linux
  stage: lint
  tags:
    - saas-linux-small-amd64
  script:
    - rustup component add rustfmt
    - cargo fmt --check

clippy:
  extends: .rust-linux
  stage: lint
  tags:
    - saas-linux-small-amd64
  script:
    - rustup component add clippy
    - cargo clippy --locked --all-targets --all-features -- -D warnings

.build-linux:
  extends: .rust-linux
  stage: build
  script:
    - rustup target add "$RUST_TARGET"
    - cargo build --locked --release --bins --target "$RUST_TARGET"
    - mkdir -p dist
    - cp "target/$RUST_TARGET/release/reeknote" dist/
    - cp "target/$RUST_TARGET/release/gnsync" dist/
    - tar -C dist -czf "$ARTIFACT_NAME.tar.gz" reeknote gnsync
  artifacts:
    name: "$ARTIFACT_NAME"
    paths:
      - "$ARTIFACT_NAME.tar.gz"
    expire_in: 1 week

build:linux:x86_64:
  extends: .build-linux
  tags:
    - saas-linux-small-amd64
  variables:
    RUST_TARGET: x86_64-unknown-linux-gnu
    ARTIFACT_NAME: reeknote-linux-x86_64

build:linux:arm64:
  extends: .build-linux
  tags:
    - saas-linux-small-arm64
  variables:
    RUST_TARGET: aarch64-unknown-linux-gnu
    ARTIFACT_NAME: reeknote-linux-aarch64
