name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.94.0

jobs:
  fmt:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt
          rustup default "$RUST_TOOLCHAIN"
      - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component clippy
          rustup default "$RUST_TOOLCHAIN"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: cargo-clippy-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: cargo-test-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo test --locked

  vendor:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
      - run: bash tools/build_vendor_archive.sh vendor.tar.gz
      - run: |
          tar -tzf vendor.tar.gz .cargo/config.toml >/dev/null
          tar -tzf vendor.tar.gz vendor >/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: vendor
          path: |
            vendor.tar.gz
            vendor.tar.gz.sha256

  build-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            artifact_name: reeknote-linux-x86_64
          - runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            artifact_name: reeknote-linux-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal
          rustup default "$RUST_TOOLCHAIN"
          rustup target add "${{ matrix.rust_target }}"
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
          key: cargo-build-${{ runner.os }}-${{ runner.arch }}-${{ matrix.rust_target }}-${{ hashFiles('Cargo.lock') }}
      - run: cargo build --locked --release --bins --target "${{ matrix.rust_target }}"
      - name: Pack binaries
        run: |
          mkdir -p dist
          cp "target/${{ matrix.rust_target }}/release/reeknote" dist/
          cp "target/${{ matrix.rust_target }}/release/rnsync" dist/
          tar -C dist -czf "${{ matrix.artifact_name }}.tar.gz" reeknote rnsync
          sha256sum "${{ matrix.artifact_name }}.tar.gz" > "${{ matrix.artifact_name }}.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.tar.gz.sha256

  nix:
    runs-on: ubuntu-24.04
    env:
      NIX_CONFIG: experimental-features = nix-command flakes
    steps:
      - uses: actions/checkout@v4
      - name: Install Nix
        run: |
          curl --fail --location https://nixos.org/nix/install | sh -s -- --no-daemon
          . "$HOME/.nix-profile/etc/profile.d/nix.sh"
          nix --version
      - name: Build flake
        run: |
          . "$HOME/.nix-profile/etc/profile.d/nix.sh"
          nix flake check --no-update-lock-file --print-build-logs
          nix build .#reeknote --no-update-lock-file --print-build-logs
          ./result/bin/reeknote >/dev/null
